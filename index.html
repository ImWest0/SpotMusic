<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Audi Music</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a0510">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: linear-gradient(180deg, #13081e 0%, #000000 20%, #000000 100%); color: #ffffff; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        header { padding: 20px 20px 10px 20px; display: flex; justify-content: space-between; align-items: center; }
        .spacer { width: 24px; }
        .logo-container { display: flex; justify-content: center; align-items: center; }
        .settings-icon { fill: #b3b3b3; width: 24px; height: 24px; cursor: pointer; }
        
        .search-wrapper { padding: 0 20px 20px 20px; }
        .search-box { background-color: #1a1a1a; border-radius: 25px; border: 1px solid #333; padding: 15px 20px; display: flex; align-items: center; }
        .search-box input { background: transparent; border: none; color: white; font-size: 16px; width: 100%; outline: none; }
        .search-box input::placeholder { color: #888; }
        
        .section-title { color: #fce181; font-size: 13px; font-weight: bold; letter-spacing: 1px; padding: 0 20px 10px 20px; text-transform: uppercase; }

        #results { flex: 1; overflow-y: auto; padding: 0 20px 130px 20px; display: flex; flex-direction: column; gap: 12px; }
        .track { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #1a1a1a; cursor: pointer; }
        .track:active { background-color: #1a1a1a; }
        .track-img { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; margin-right: 15px; background-color: #222; }
        .track-info { display: flex; flex-direction: column; overflow: hidden; flex: 1; padding-right: 15px; justify-content: center; }
        .track-title { font-size: 16px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #fff; }
        .track-artist { font-size: 13px; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 4px; }
        .cache-btn { background-color: transparent; color: #fce181; border: 1px solid #fce181; border-radius: 15px; padding: 6px 12px; font-size: 11px; font-weight: bold; cursor: pointer; flex-shrink: 0; }
        .cache-btn:active { background-color: #fce181; color: black; }

        #custom-player { position: fixed; bottom: 0; left: 0; width: 100%; background-color: #121212; border-top: 1px solid #222; padding: 15px 20px 25px 20px; display: flex; flex-direction: column; gap: 15px; z-index: 100; }
        .player-info-row { display: flex; align-items: center; gap: 15px; }
        .album-art-placeholder { width: 45px; height: 45px; background-color: #222; border-radius: 8px; flex-shrink: 0; object-fit: cover; }
        .player-text { display: flex; flex-direction: column; overflow: hidden; flex: 1; }
        .player-title { font-size: 15px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .player-subtitle { font-size: 13px; color: #b3b3b3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
        
        .progress-row { display: flex; align-items: center; gap: 10px; font-size: 11px; color: #888; }
        .progress-bar-container { flex: 1; height: 4px; background-color: #333; border-radius: 2px; position: relative; cursor: pointer; padding: 10px 0; background-clip: content-box; }
        .progress-fill { position: absolute; left: 0; top: 10px; height: 4px; background-color: #fce181; border-radius: 2px; width: 0%; transition: width 0.1s linear; }
        
        .controls-row { display: flex; justify-content: center; align-items: center; gap: 30px; }
        .ctrl-btn { background: none; border: none; fill: #fff; width: 20px; height: 20px; cursor: pointer; }
        .play-btn-wrapper { width: 55px; height: 55px; background-color: #fce181; border-radius: 50%; display: flex; justify-content: center; align-items: center; box-shadow: 0 0 15px rgba(252, 225, 129, 0.3); cursor: pointer; }
        .play-icon { fill: #000; width: 22px; height: 22px; margin-left: 3px; }
        .pause-icon { fill: #000; width: 22px; height: 22px; display: none; }
        
        .loader { width: 20px; height: 20px; border: 3px solid rgba(0,0,0,0.2); border-top-color: #000; border-radius: 50%; animation: spin 1s linear infinite; display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        audio { display: none; }
    </style>
</head>
<body>

    <header>
        <div class="spacer"></div>
        <div class="logo-container">
            <svg width="100" height="35" viewBox="0 0 140 40" xmlns="http://www.w3.org/2000/svg">
                <circle cx="25" cy="20" r="16" stroke="#fce181" stroke-width="3" fill="none"/>
                <circle cx="55" cy="20" r="16" stroke="#fce181" stroke-width="3" fill="none"/>
                <circle cx="85" cy="20" r="16" stroke="#fce181" stroke-width="3" fill="none"/>
                <circle cx="115" cy="20" r="16" stroke="#fce181" stroke-width="3" fill="none"/>
            </svg>
        </div>
        <svg class="settings-icon" viewBox="0 0 24 24"><path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.06-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.73,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.06,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.43-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.49-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/></svg>
    </header>

    <div class="search-wrapper">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Caută piese (ex. RAVA)..." autocomplete="off" onkeypress="handleKeyPress(event)">
        </div>
    </div>

    <div class="section-title">Rezultate Globale</div>

    <div id="results">
        <p style="color: #555; text-align: center; margin-top: 20px; font-size: 14px;">Aștept să cauți o piesă...</p>
    </div>

    <div id="custom-player">
        <div class="player-info-row">
            <img id="playerCover" class="album-art-placeholder" src="data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=" alt="cover">
            <div class="player-text">
                <span class="player-title" id="playerTitle">Alege o melodie</span>
                <span class="player-subtitle" id="playerArtist">Gata de redare</span>
            </div>
        </div>
        
        <div class="progress-row">
            <span id="currentTimeDisplay">0:00</span>
            <div class="progress-bar-container" id="progressBarContainer" onclick="seekAudio(event)">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <span id="durationDisplay">0:00</span>
        </div>

        <div class="controls-row">
            <svg class="ctrl-btn" viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
            
            <div class="play-btn-wrapper" onclick="togglePlay()">
                <svg class="play-icon" id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                <svg class="pause-icon" id="pauseIcon" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                <div class="loader" id="playerLoader"></div>
            </div>
            
            <svg class="ctrl-btn" viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
        </div>
    </div>

    <audio id="audioPlayer"></audio>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(() => {});
        }

        const audioPlayer = document.getElementById('audioPlayer');
        const resultsContainer = document.getElementById('results');
        const searchInput = document.getElementById('searchInput');
        
        const playerTitle = document.getElementById('playerTitle');
        const playerArtist = document.getElementById('playerArtist');
        const playerCover = document.getElementById('playerCover');
        const playIcon = document.getElementById('playIcon');
        const pauseIcon = document.getElementById('pauseIcon');
        const playerLoader = document.getElementById('playerLoader');
        const progressFill = document.getElementById('progressFill');
        const currentTimeDisplay = document.getElementById('currentTimeDisplay');
        const durationDisplay = document.getElementById('durationDisplay');
        const progressBarContainer = document.getElementById('progressBarContainer');

        // Servere Piped - Mult mai stabile pe audio decât Invidious
        const SERVERS = [
            'https://pipedapi.smnz.de',
            'https://pipedapi.kavin.rocks'
        ];
        
        // Proxy pentru a trece de blocajele browserului
        const PROXY_URL = 'https://api.allorigins.win/raw?url=';

        function handleKeyPress(e) {
            if (e.key === 'Enter') {
                searchMusic();
                searchInput.blur();
            }
        }

        // FUNCȚIE NOUĂ: Fetch cu limită de timp (Timeout) ca să nu mai înghețe
        async function fetchWithTimeoutAndProxy(endpoint) {
            for (let server of SERVERS) {
                const targetUrl = server + endpoint;
                const proxiedUrl = PROXY_URL + encodeURIComponent(targetUrl);
                
                try {
                    const controller = new AbortController();
                    // Dacă serverul nu răspunde în 6 secunde, îl oprim forțat
                    const timeoutId = setTimeout(() => controller.abort(), 6000);
                    
                    const response = await fetch(proxiedUrl, { signal: controller.signal });
                    clearTimeout(timeoutId);
                    
                    if (response.ok) return await response.json();
                } catch (error) {
                    console.log(`Serverul ${server} e picat sau prea lent. Trec la următorul...`);
                }
            }
            throw new Error('Toate serverele sunt blocate momentan.');
        }

        async function searchMusic() {
            const query = searchInput.value.trim();
            if (!query) return;

            resultsContainer.innerHTML = '<p style="color: #888; text-align: center;">Se conectează la servere...</p>';

            try {
                const data = await fetchWithTimeoutAndProxy(`/search?q=${encodeURIComponent(query)}&filter=music_songs`);
                resultsContainer.innerHTML = '';
                
                if (!data || !data.items || data.items.length === 0) {
                    resultsContainer.innerHTML = '<p style="color: #888; text-align: center;">Niciun rezultat găsit.</p>';
                    return;
                }

                data.items.forEach(track => {
                    const videoId = track.url.split('watch?v=')[1];
                    const safeTitle = track.title.replace(/'/g, "\\'").replace(/"/g, "&quot;");
                    const safeArtist = track.uploaderName.replace(/'/g, "\\'").replace(/"/g, "&quot;");
                    const coverUrl = `https://i.ytimg.com/vi/${videoId}/mqdefault.jpg`; 

                    const trackDiv = document.createElement('div');
                    trackDiv.className = 'track';
                    trackDiv.innerHTML = `
                        <img src="${coverUrl}" class="track-img" alt="cover">
                        <div class="track-info" onclick="fetchAndPlay('${safeTitle}', '${safeArtist}', '${videoId}', '${coverUrl}')">
                            <div class="track-title">${track.title}</div>
                            <div class="track-artist">${track.uploaderName}</div>
                        </div>
                        <button class="cache-btn" onclick="fetchAndCache('${safeTitle}', '${videoId}')">Descarcă</button>
                    `;
                    resultsContainer.appendChild(trackDiv);
                });
            } catch (error) {
                resultsContainer.innerHTML = '<p style="color: #e57373; text-align: center;">Eroare: Serverele sunt suprasolicitate. Mai încearcă o dată.</p>';
            }
        }

        async function getAudioUrl(videoId) {
            const data = await fetchWithTimeoutAndProxy(`/streams/${videoId}`);
            if (data.audioStreams && data.audioStreams.length > 0) {
                // Returnează direct stream-ul audio m4a care merge pe S25 Ultra perfect
                return data.audioStreams.find(s => s.mimeType.includes('m4a'))?.url || data.audioStreams[0].url;
            }
            throw new Error("Fără stream audio.");
        }

        async function fetchAndPlay(title, artist, videoId, cover) {
            playerTitle.innerText = title;
            playerArtist.innerText = artist;
            playerCover.src = cover;
            
            playIcon.style.display = 'none';
            pauseIcon.style.display = 'none';
            playerLoader.style.display = 'block';

            try {
                const finalAudioUrl = await getAudioUrl(videoId);
                audioPlayer.src = finalAudioUrl;
                audioPlayer.play().then(() => {
                    updatePlayPauseUI(true);
                }).catch(() => {
                    playerTitle.innerText = "Eroare la pornire. Încearcă din nou.";
                    updatePlayPauseUI(false);
                });
            } catch (error) {
                playerTitle.innerText = "Eroare de extragere.";
                updatePlayPauseUI(false);
            }
        }

        async function fetchAndCache(title, videoId) {
            alert(`Caut sursa audio pentru descărcare: ${title}`);
            try {
                const finalAudioUrl = await getAudioUrl(videoId);
                const cache = await caches.open('muzica-offline-v1');
                
                // Salvăm direct link-ul curat în memoria telefonului
                await cache.add(finalAudioUrl);
                alert(`Perfect! Melodia a fost pusă în cache-ul telefonului.`);
            } catch (error) {
                alert(`Eroare. Browserul tău nu a putut accesa fișierul brut.`);
            }
        }

        // LOGICĂ PLAYER CUSTOM
        function togglePlay() {
            if (!audioPlayer.src) return;
            if (audioPlayer.paused) {
                audioPlayer.play();
                updatePlayPauseUI(true);
            } else {
                audioPlayer.pause();
                updatePlayPauseUI(false);
            }
        }

        function updatePlayPauseUI(isPlaying) {
            playerLoader.style.display = 'none';
            if (isPlaying) {
                playIcon.style.display = 'none';
                pauseIcon.style.display = 'block';
            } else {
                playIcon.style.display = 'block';
                pauseIcon.style.display = 'none';
            }
        }

        audioPlayer.addEventListener('timeupdate', () => {
            if (audioPlayer.duration) {
                const progressPercent = (audioPlayer.currentTime / audioPlayer.duration) * 100;
                progressFill.style.width = progressPercent + '%';
                currentTimeDisplay.innerText = formatTime(audioPlayer.currentTime);
                durationDisplay.innerText = formatTime(audioPlayer.duration);
            }
        });

        function seekAudio(e) {
            if (!audioPlayer.duration) return;
            const rect = progressBarContainer.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            const clickPercent = clickX / rect.width;
            audioPlayer.currentTime = clickPercent * audioPlayer.duration;
        }

        function formatTime(seconds) {
            if (isNaN(seconds) || seconds === Infinity) return "0:00";
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        }

        audioPlayer.addEventListener('ended', () => { 
            updatePlayPauseUI(false); 
            progressFill.style.width = '0%'; 
            currentTimeDisplay.innerText = '0:00'; 
        });
        
        audioPlayer.addEventListener('playing', () => updatePlayPauseUI(true));
        audioPlayer.addEventListener('pause', () => updatePlayPauseUI(false));
    </script>
</body>
</html>
